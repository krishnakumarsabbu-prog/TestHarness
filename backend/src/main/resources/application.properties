spring.application.name=alerts-portal-backend
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:alertsportal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for dev debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173

# Logging
logging.level.com.alertsportal=INFO
logging.level.org.springframework.web=WARN
