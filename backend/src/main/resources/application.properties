spring.application.name=alerts-portal-backend
server.port=8080

# Supabase PostgreSQL connection
# Replace with your actual Supabase connection string from Project Settings > Database
spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR_SUPABASE_DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# CORS - update with your frontend URL
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173

# Logging
logging.level.com.alertsportal=INFO
logging.level.org.springframework.web=WARN
